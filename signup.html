<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your WanderIndia account — Join 50,000+ travelers exploring India. Get personalized itineraries, exclusive deals, and 24/7 travel support.">
    <title>Sign Up | WanderIndia — Join 50,000+ India Travelers</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Ccircle cx='50' cy='50' r='44' stroke='%230F7A5A' stroke-width='3' fill='none'/%3E%3Cpath d='M50 22 C42 22 36 28 36 36 C36 46 50 62 50 62 C50 62 64 46 64 36 C64 28 58 22 50 22Z' fill='%23D4A017'/%3E%3Ccircle cx='50' cy='36' r='6' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page" id="signup-page">

    <!-- Top-right controls -->
    <div class="auth-top-icons">
        <button class="icon-btn dark-toggle" id="signup-dark-toggle" title="Toggle Dark Mode" aria-label="Toggle dark mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="icon-btn rtl-toggle" id="signup-rtl-toggle" title="Toggle RTL" aria-label="Toggle RTL direction">
            <i class="fas fa-exchange-alt"></i>
        </button>
    </div>

    <!-- Decorative background -->
    <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;">
        <div style="position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(212,160,23,0.12) 0%,transparent 70%);top:-200px;left:-200px;"></div>
        <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(15,122,90,0.12) 0%,transparent 70%);bottom:-150px;right:-150px;"></div>
        <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(232,124,43,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(27,108,168,0.03) 1px,transparent 1px);background-size:48px 48px;"></div>
        <div style="position:absolute;top:10%;right:6%;opacity:0.12;animation:float 8s ease-in-out infinite;">
            <i class="fas fa-mountain" style="font-size:2.5rem;color:var(--primary);"></i>
        </div>
        <div style="position:absolute;bottom:15%;left:5%;opacity:0.12;animation:float 6s ease-in-out infinite 1.5s;">
            <i class="fas fa-umbrella-beach" style="font-size:2rem;color:var(--secondary);"></i>
        </div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card animate-on-scroll zoom-in" id="signup-card">
        <!-- Logo -->
        <a href="index.html" class="auth-logo" id="signup-logo" aria-label="WanderIndia - Home">
            <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="signupGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F7A5A"/><stop offset="100%" stop-color="#D4A017"/></linearGradient></defs>
                <circle cx="50" cy="50" r="44" stroke="url(#signupGrad)" stroke-width="3" fill="none"/>
                <ellipse cx="50" cy="50" rx="28" ry="44" stroke="url(#signupGrad)" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
                <line x1="6" y1="50" x2="94" y2="50" stroke="url(#signupGrad)" stroke-width="1.5" stroke-opacity="0.4"/>
                <path d="M50 22 C42 22 36 28 36 36 C36 46 50 62 50 62 C50 62 64 46 64 36 C64 28 58 22 50 22Z" fill="url(#signupGrad)" fill-opacity="0.85"/>
                <circle cx="50" cy="36" r="6" fill="white" fill-opacity="0.9"/>
            </svg>
            <span class="auth-logo-text">Wander<span>India</span></span>
        </a>

        <h1 class="auth-title">Start Your Journey</h1>
        <p class="auth-subtitle">Join 50,000+ travelers exploring India</p>

        <form class="auth-form" id="signup-form" onsubmit="event.preventDefault();window.location.href='index.html';">
            <div class="form-group">
                <label class="form-label" for="signup-first-name">First Name</label>
                <input type="text" id="signup-first-name" class="form-input" placeholder="Your first name" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-last-name">Last Name</label>
                <input type="text" id="signup-last-name" class="form-input" placeholder="Your last name" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-email">Email Address</label>
                <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-phone">Phone Number</label>
                <input type="tel" id="signup-phone" class="form-input" placeholder="+91 98765 43210" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-password">Create Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signup-password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-confirm">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signup-confirm" class="form-input" placeholder="Repeat your password" required>
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:0.82rem;color:var(--text-body);line-height:1.5;" id="terms-label">
                    <input type="checkbox" style="accent-color:var(--primary);margin-top:2px;flex-shrink:0;" required id="signup-terms">
                    I agree to WanderIndia's <a href="#" style="color:var(--primary);">Terms of Service</a> and <a href="#" style="color:var(--primary);">Privacy Policy</a>
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-shine" id="signup-submit-btn" style="margin-bottom:4px;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-divider">or sign up with</div>

        <div style="display:flex;flex-direction:column;gap:10px;">
            <!-- Google -->
            <button class="btn-social" id="signup-google">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign up with Google
            </button>
            <!-- Apple -->
            <button class="btn-social" id="signup-apple">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                </svg>
                Sign up with Apple
            </button>
            <!-- Facebook -->
            <button class="btn-social" id="signup-facebook">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                    <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.887v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
                </svg>
                Sign up with Facebook
            </button>
        </div>

        <p class="auth-footer-text">Already have an account? <a href="login.html" id="signup-login-link">Sign in here</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
